<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aanvraagformulier Dekkerautoverzekering</title>
    <link rel="icon" href="C:\Users\Randy\OneDrive\Bureaublad\Klaas Vis\Nieuwste programma\logo.png" type="image/png">
    
    <!-- EmailJS SDK toevoegen -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("ONDQRoTrKQCSL4P-M"); // Jouw User ID
        })();
    </script>
    <!-- SignaturePad SDK -->
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e0f7fa;
            margin: 0;
            padding: 20px;
        }
        .form-container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo img {
            max-width: 450px;
            height: auto;
        }
        .footer-logo {
            text-align: center;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            margin-top: 20px;
        }
        .footer-logo img {
            max-width: 450px;
            height: auto;
        }
        .footer {
            background: #007BFF;
            color: #fff;
            text-align: center;
            padding: 20px;
            position: absolute;
            bottom: 0;
            width: 100%;
            box-sizing: border-box;
        }
        .footer p {
            margin: 10px 0;
        }
        .footer a {
            color: #fff;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        .step-indicators {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .step {
            width: 100%;
            text-align: center;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            background: #f0f0f0;
            font-weight: bold;
        }
        .active-step {
            background: #28a745;
            color: #fff;
            border-color: #28a745;
        }
        .step-content {
            display: none;
        }
        .step-content.active {
            display: block;
        }
        .conditional {
            display: none;
        }
        .conditional.active {
            display: block;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .form-group input[type="radio"] {
            width: auto;
            margin-right: 5px;
        }
        .form-group .radio-group {
            display: flex;
            gap: 15px;
        }
        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .checkbox-group {
            margin-top: 10px;
        }
        .checkbox-item {
            margin-bottom: 10px;
        }
        .checkbox-item input[type="checkbox"] {
            margin-right: 10px;
        }
        .checkbox-label {
            display: inline-block;
            font-size: 16px;
        }
        .switch {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .switch input[type="radio"] {
            display: none;
        }
        .switch-label {
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 5px;
            background-color: #f0f0f0;
            margin-right: 10px;
        }
        .switch input[type="radio"]:checked + .switch-label {
            background-color: #28a745;
            color: white;
        }
        .radio-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .radio-label {
            margin-left: 5px;
        }
        .signature-pad {
            border: 1px solid #000;
            width: 90vw;
            max-width: 400px;
            height: 200px;
            background-color: #fff;
            touch-action: none;
            display: block;
            margin: 0 auto;
        }
        .navigation-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            color: #fff;
            cursor: pointer;
        }
        .prev-button {
            background-color: #6c757d;
        }
        .next-button {
            background-color: #007BFF;
        }
        .submit-button {
            background-color: #006400;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            display: block;
            margin: 20px auto;
            border-radius: 5px;
        }
        .text-center {
            text-align: center;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.4);
            padding-top: 60px;
        }
        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 500px;
        }
        .modal-buttons {
            text-align: center;
            margin-top: 20px;
        }
        .modal-buttons button {
            padding: 10px 20px;
            margin: 0 10px;
            font-size: 16px;
        }
        .form-confirm {
            font-family: Tahoma, sans-serif;
            font-size: 14px;
            background-color: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
        }
        .form-confirm label {
            display: block;
            margin-bottom: 10px;
        }
        .form-confirm ul {
            margin: 0;
            padding: 0 0 0 20px;
            list-style-type: disc;
        }
        .form-confirm input[type="checkbox"] {
            margin-top: 10px;
        }
        .additional-info {
            display: none;
            margin-top: 10px;
        }
        textarea {
            width: 100%;
            height: 100px;
            resize: none;
        }
        .promo {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background-color: #ffcc00;
            color: #333;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 300px;
            font-size: 14px;
        }
        .promo img {
            max-width: 30px;
            margin-right: 10px;
            vertical-align: middle;
        }
        .promo strong {
            font-size: 16px;
            display: block;
            margin-bottom: 5px;
        }
        .content {
            min-height: 150vh;
        }
    </style>
</head>
<body>
    <div class="logo">
        <img src="AfbeeldingDekker.png" alt="Dekkerautoverzekering">
        <h2>Online aanvraagformulier</h2>
    </div>

    <div class="form-container">
        <form id="insurance-form">
            <div class="step-indicators">
                <div class="step active-step" id="step1-indicator">Gegevens verzekeringnemer</div>
                <div class="step" id="step2-indicator">Gegevens auto</div>
                <div class="step" id="step4-indicator">Slotvragen</div>
                <div class="step" id="step5-indicator">Ondertekenen en indienen</div>
            </div>

            <!-- Step 1 -->
            <div class="step-content active" id="step1">
                <div class="form-group">
                    <label for="offertenummer">Offertenummer:</label>
                    <input type="text" id="offertenummer" name="offertenummer" required>
                </div>
                <div class="form-group">
                    <label for="Geboortedatum">Geboortedatum verzekeringnemer:</label>
                    <input type="date" id="Geboortedatum" name="Geboortedatum" required>
                </div>
                <div class="form-group">
                    <label for="regelmatige-bestuurder">Bent u de regelmatige bestuurder?</label>
                    <div class="switch">
                        <input type="radio" id="regelmatige-bestuurder-yes" name="regelmatige-bestuurder" value="yes">
                        <label for="regelmatige-bestuurder-yes" class="switch-label">Ja</label>
                        <input type="radio" id="regelmatige-bestuurder-no" name="regelmatige-bestuurder" value="no">
                        <label for="regelmatige-bestuurder-no" class="switch-label">Nee</label>
                    </div>
                </div>

                <div id="regelmatige-bestuurder-info" class="conditional">
                    <div class="form-group">
                        <h4>Gegevens van de regelmatige bestuurder</h4>
                        <label for="voorletters">Voorletters:</label>
                        <input type="text" id="voorletters" name="voorletters">
                    </div>
                    <div class="form-group">
                        <label for="achternaam">Achternaam:</label>
                        <input type="text" id="achternaam" name="achternaam">
                    </div>
                    <div class="form-group">
                        <label for="Postcode en huisnummer">Postcode en huisnummer:</label>
                        <input type="text" id="Postcode en huisnummer" name="Postcode en huisnummer">
                    </div>
                    <div class="form-group">
                        <label for="geboortedatum">Geboortedatum:</label>
                        <input type="date" id="geboortedatum" name="geboortedatum">
                    </div>
                    <div class="form-group">
                        <label for="relatie">Relatie tot verzekeringnemer:</label>
                        <input type="text" id="relatie" name="relatie">
                    </div>
                </div>

                <h4>Betaalgegevens</h4>
                <div class="form-group">
                    <label>Betalingstermijn:</label>
                    <div class="switch">
                        <input type="radio" id="maandelijks" name="betalingstermijn" value="maandelijks" checked>
                        <label for="maandelijks" class="switch-label">Maandelijks</label>
                        <input type="radio" id="kwartaal" name="betalingstermijn" value="kwartaal">
                        <label for="kwartaal" class="switch-label">Kwartaal</label>
                        <input type="radio" id="jaarlijks" name="betalingstermijn" value="jaarlijks">
                        <label for="jaarlijks" class="switch-label">Jaarlijks</label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="iban">Uw IBAN-rekeningnummer:</label>
                    <input type="text" id="iban" name="iban" required>
                </div>
            </div>

            <!-- Step 2 -->
            <div class="step-content" id="step2">
                <div class="form-group">
                    <label for="ingangsdatum">Ingangsdatum verzekering:</label>
                    <input type="date" id="ingangsdatum" name="ingangsdatum">
                </div>
                <div>
                    <label>Ingangsdatum is nog niet bekend<input type="checkbox" id="verklaring-ingangsdatum" name="verklaring-ingangsdatum"></label>
                </div>
                <br>
                <div class="form-group">
                    <div class="switch">
                        <input type="radio" id="dekking-voorstel" name="dekking" value="voorstel" checked>
                        <label for="dekking-voorstel" class="switch-label">Dekking en premie conform het verzekeringsvoorstel</label>
                        <input type="radio" id="dekking-anders" name="dekking" value="anders">
                        <label for="dekking-anders" class="switch-label">Anders</label>
                    </div>
                </div>
                <div id="dekking-omschrijving" class="conditional">
                    <div class="form-group">
                        <label>Gewenste dekking:</label>
                        <div class="checkbox-group">
                            <div class="checkbox-item">
                                <input type="checkbox" id="wa" name="dekking-type" value="wa" checked disabled>
                                <label for="wa" class="checkbox-label">WA (verplicht)</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="casco-compleet" name="dekking-type" value="casco-compleet">
                                <label for="casco-compleet" class="checkbox-label">Casco Compleet (Allrisk)</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="beperkt-casco" name="dekking-type" value="beperkt-casco">
                                <label for="beperkt-casco" class="checkbox-label">Beperkt Casco</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="schadeverzekering" name="dekking-type" value="schadeverzekering">
                                <label for="schadeverzekering" class="checkbox-label">Schadeverzekering voor Inzittenden</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="rechtsbijstand" name="dekking-type" value="rechtsbijstand">
                                <label for="rechtsbijstand" class="checkbox-label">Rechtsbijstand Verkeer</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="schade-ervaring">Heeft u of de regelmatige bestuurder in de afgelopen 5 jaar schade aan of met een motorvoertuig gehad?</label>
                    <div class="switch">
                        <input type="radio" id="schade-ervaring-yes" name="schade-ervaring" value="yes">
                        <label for="schade-ervaring-yes" class="switch-label">Ja</label>
                        <input type="radio" id="schade-ervaring-no" name="schade-ervaring" value="no">
                        <label for="schade-ervaring-no" class="switch-label">Nee</label>
                    </div>
                </div>
                <div id="schade-ervaring-info" class="conditional">
                    <div class="form-group">
                        <label for="schade-datum">Schadedatum:</label>
                        <input type="text" id="schade-datum" name="schade-datum">
                    </div>
                    <div class="form-group">
                        <label for="schade-bedrag">Schadebedrag(en):</label>
                        <input type="text" id="schade-bedrag" name="schade-bedrag">
                    </div>
                    <div class="form-group">
                        <label for="soort-schade">Soort schade(s):</label>
                        <input type="text" id="soort-schade" name="soort-schade">
                    </div>
                </div>
                <div class="form-group">
                    <label for="schadevrije-jaren">Heeft u bij uw vorige verzekeringsmaatschappij schadevrije jaren opgebouwd?</label>
                    <div class="switch">
                        <input type="radio" id="schadevrije-jaren-yes" name="schadevrije-jaren" value="yes">
                        <label for="schadevrije-jaren-yes" class="switch-label">Ja</label>
                        <input type="radio" id="schadevrije-jaren-no" name="schadevrije-jaren" value="no">
                        <label for="schadevrije-jaren-no" class="switch-label">Nee</label>
                    </div>
                </div>
                <div id="schadevrije-jaren-info" class="conditional">
                    <div class="form-group">
                        <label for="aantal-schadevrije-jaren">Aantal schadevrije jaren:</label>
                        <input type="number" id="aantal-schadevrije-jaren" name="aantal-schadevrije-jaren">
                    </div>
                </div>
                <div id="opzegservice-container" style="display: none;">
                    <div class="form-group">
                        <label>Indien uw huidige verzekering elders is ondergebracht, kunnen wij deze voor u opzeggen.</label>
                        <label>Wenst u gebruik te maken van onze opzegservice?</label>
                        <div class="switch">
                            <input type="radio" id="opzegservice-yes" name="opzegservice" value="yes">
                            <label for="opzegservice-yes" class="switch-label">Ja</label>
                            <input type="radio" id="opzegservice-no" name="opzegservice" value="no">
                            <label for="opzegservice-no" class="switch-label">Nee</label>
                        </div>
                    </div>
                    <div id="opzegservice-details" style="display: none;">
                        <div class="form-group">
                            <label for="verzekeringsmaatschappij">Verzekeringsmaatschappij:</label>
                            <input type="text" id="verzekeringsmaatschappij" name="verzekeringsmaatschappij">
                        </div>
                        <div class="form-group">
                            <label for="name">Voorletter(s) en achternaam verzekeringnemer:</label>
                            <input type="text" id="name" name="name">
                        </div>
                        <div class="form-group">
                            <label for="polisnummer">Uw huidige polisnummer:</label>
                            <input type="text" id="polisnummer" name="polisnummer">
                        </div>
                        <div class="form-group">
                            <label for="kenteken">Kenteken motorvoertuig:</label>
                            <input type="text" id="kenteken" name="kenteken">
                        </div>
                        <div class="form-group">
                            <label for="reden-opzegging">Reden van opzegging:</label>
                            <input type="text" id="reden-opzegging" name="reden-opzegging">
                        </div>
                        <div class="form-group">
                            <label for="datum-opzegging">Datum opzegging:</label>
                            <input type="date" id="datum-opzegging" name="datum-opzegging">
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="aanschaf">Heeft u de auto particulier of zakelijk aangeschaft?</label>
                    <div class="switch">
                        <input type="radio" id="particulier" name="aanschaf" value="particulier" checked>
                        <label for="particulier" class="switch-label">Particulier</label>
                        <input type="radio" id="zakelijk" name="aanschaf" value="zakelijk">
                        <label for="zakelijk" class="switch-label">Zakelijk</label>
                    </div>
                </div>
                <div id="zakelijk-info" class="conditional" style="display: none;">
                    <div class="form-group">
                        <label for="rechtsvorm">Rechtsvorm:</label>
                        <select id="rechtsvorm" name="rechtsvorm">
                            <option value="bv">Besloten Vennootschap (BV)</option>
                            <option value="zzp">Eenmanszaak (ZZP)</option>
                            <option value="nv">Naamloze Vennootschap (NV)</option>
                            <option value="stichting">Stichting/Vereniging</option>
                            <option value="anders">Anders</option>
                        </select>
                    </div>
                    <div class="form-group" id="rechtsvorm-omschrijving-container" style="display: none;">
                        <label for="rechtsvorm-omschrijving">Geef aan wat van toepassing is:</label>
                        <select id="rechtsvorm-omschrijving" name="rechtsvorm-omschrijving">
                            <option value="ubo-eenmanszaak">Betreft een eenmanszaak, vul uw gegevens hieronder in (UBO).</option>
                            <option value="ubo-belang">Uiteindelijk belanghebbende(n) met een belang van 25% of meer.</option>
                            <option value="geen-ubo">Geen belanghebbende(n) van 25% of meer.</option>
                            <option value="zeggenschap">Personen die feitelijk zeggenschap uitoefenen.</option>
                        </select>
                    </div>
                    <h3>UBO verklaring</h3>
                    <h4>Belanghebbende 1</h4>
                    <div class="form-group">
                        <label>Voorletter(s) en achternaam</label>
                        <input type="text" name="ubo1-naam" placeholder="Naam belanghebbende">
                    </div>
                    <div class="form-group">
                        <label>Adres</label>
                        <input type="text" name="ubo1-adres" placeholder="Adres">
                    </div>
                    <div class="form-group">
                        <label>Postcode en woonplaats</label>
                        <input type="text" name="ubo1-postcode" placeholder="Postcode en woonplaats">
                    </div>
                    <div class="form-group">
                        <label>Geboortedatum</label>
                        <input type="date" name="ubo1-geboortedatum">
                    </div>
                    <h4>Belanghebbende 2</h4>
                    <div class="form-group">
                        <label>Voorletter(s) en achternaam</label>
                        <input type="text" name="ubo2-naam" placeholder="Naam belanghebbende">
                    </div>
                    <div class="form-group">
                        <label>Adres</label>
                        <input type="text" name="ubo2-adres" placeholder="Adres">
                    </div>
                    <div class="form-group">
                        <label>Postcode en woonplaats</label>
                        <input type="text" name="ubo2-postcode" placeholder="Postcode en woonplaats">
                    </div>
                    <div class="form-group">
                        <label>Geboortedatum</label>
                        <input type="date" name="ubo2-geboortedatum">
                    </div>
                    <h4>Belanghebbende 3</h4>
                    <div class="form-group">
                        <label>Voorletter(s) en achternaam</label>
                        <input type="text" name="ubo3-naam" placeholder="Naam belanghebbende">
                    </div>
                    <div class="form-group">
                        <label>Adres</label>
                        <input type="text" name="ubo3-adres" placeholder="Adres">
                    </div>
                    <div class="form-group">
                        <label>Postcode en woonplaats</label>
                        <input type="text" name="ubo3-postcode" placeholder="Postcode en woonplaats">
                    </div>
                    <div class="form-group">
                        <label>Geboortedatum</label>
                        <input type="date" name="ubo3-geboortedatum">
                    </div>
                    <div class="form-group">
                        <label for="aantal-belanghebbenden">Indien meer dan 3 belanghebbenden, totaal aantal:</label>
                        <input type="number" id="aantal-belanghebbenden" name="aantal-belanghebbenden" min="1" max="10">
                    </div>
                    <div id="belanghebbenden-info"></div>
                </div>
            </div>

            <!-- Step 4 -->
            <div class="step-content" id="step4">
                <div class="form-group">
                    <label>Is de auto vanaf de datum dat deze op naam van de kentekenhouder staat, langer dan 10 dagen onverzekerd?</label>
                    <div class="switch">
                        <input type="radio" id="onverzekerd-yes" name="onverzekerd" value="yes">
                        <label for="onverzekerd-yes" class="switch-label">Ja</label>
                        <input type="radio" id="onverzekerd-no" name="onverzekerd" value="no">
                        <label for="onverzekerd-no" class="switch-label">Nee</label>
                    </div>
                    <div id="onverzekerd-info" class="additional-info">
                        <label for="onverzekerd-text">Toelichting:</label>
                        <textarea id="onverzekerd-text" name="onverzekerd-text"></textarea>
                    </div>
                </div>
                <div class="form-group">
                    <label>Heeft een verzekeraar in de afgelopen 8 jaar:</label>
                    <label>Geweigerd een verzekeringsovereenkomst te sluiten met u of een andere belanghebbende?</label>
                    <label>Een verzekering opgezegd van u of een andere belanghebbende?</label>
                    <div class="switch">
                        <input type="radio" id="verzekeraar-yes" name="verzekeraar" value="yes">
                        <label for="verzekeraar-yes" class="switch-label">Ja</label>
                        <input type="radio" id="verzekeraar-no" name="verzekeraar" value="no">
                        <label for="verzekeraar-no" class="switch-label">Nee</label>
                    </div>
                    <div id="verzekeraar-info" class="additional-info">
                        <label for="verzekeraar-text">Toelichting:</label>
                        <textarea id="verzekeraar-text" name="verzekeraar-text"></textarea>
                    </div>
                </div>
                <div class="form-group">
                    <label>Bent u, of is een andere belanghebbende de laatste 5 jaar failliet verklaard, in een schuldsanering betrokken of is de rechter akkoord gegaan met een (uitstel) surseance van betaling?</label>
                    <div class="switch">
                        <input type="radio" id="failliet-yes" name="failliet" value="yes">
                        <label for="failliet-yes" class="switch-label">Ja</label>
                        <input type="radio" id="failliet-no" name="failliet" value="no">
                        <label for="failliet-no" class="switch-label">Nee</label>
                    </div>
                    <div id="failliet-info" class="additional-info">
                        <label for="failliet-text">Toelichting:</label>
                        <textarea id="failliet-text" name="failliet-text"></textarea>
                    </div>
                </div>
                <div class="form-group">
                    <label>Heeft de deurwaarder op dit moment beslag gelegd op inkomsten of bezittingen van u of een andere belanghebbende? Of op het te verzekeren risico of andere eigendommen?</label>
                    <div class="switch">
                        <input type="radio" id="beslag-yes" name="beslag" value="yes">
                        <label for="beslag-yes" class="switch-label">Ja</label>
                        <input type="radio" id="beslag-no" name="beslag" value="no">
                        <label for="beslag-no" class="switch-label">Nee</label>
                    </div>
                    <div id="beslag-info" class="additional-info">
                        <label for="beslag-text">Toelichting:</label>
                        <textarea id="beslag-text" name="beslag-text"></textarea>
                    </div>
                </div>
                <div class="form-group">
                    <label>Heeft u in de laatste 8 jaar een rijverbod of een rijontzegging gehad?</label>
                    <div class="switch">
                        <input type="radio" id="rijontzegging-yes" name="rijontzegging" value="yes">
                        <label for="rijontzegging-yes" class="switch-label">Ja</label>
                        <input type="radio" id="rijontzegging-no" name="rijontzegging" value="no">
                        <label for="rijontzegging-no" class="switch-label">Nee</label>
                    </div>
                    <div id="rijontzegging-info" class="additional-info">
                        <label for="rijontzegging-text">Toelichting:</label>
                        <textarea id="rijontzegging-text" name="rijontzegging-text"></textarea>
                    </div>
                </div>
                <div class="form-group">
                    <label>Hebt u, of een andere belanghebbende, in de laatste 5 jaar voor het sluiten van deze verzekering een conflict gehad waarbij juridische hulp nodig was?</label>
                    <div class="switch">
                        <input type="radio" id="conflict-yes" name="conflict" value="yes">
                        <label for="conflict-yes" class="switch-label">Ja</label>
                        <input type="radio" id="conflict-no" name="conflict" value="no">
                        <label for="conflict-no" class="switch-label">Nee</label>
                    </div>
                    <div id="conflict-info" class="additional-info">
                        <label for="conflict-text">Toelichting:</label>
                        <textarea id="conflict-text" name="conflict-text"></textarea>
                    </div>
                </div>
                <div class="form-group">
                    <label>Heeft u verder iets mede te delen over het te verzekeren risico, uzelf of een andere belanghebbende, dat (eventueel) voor de beoordeling van belang zou kunnen zijn?</label>
                    <div class="switch">
                        <input type="radio" id="meer-informatie-yes" name="meer-informatie" value="yes">
                        <label for="meer-informatie-yes" class="switch-label">Ja</label>
                        <input type="radio" id="meer-informatie-no" name="meer-informatie" value="no">
                        <label for="meer-informatie-no" class="switch-label">Nee</label>
                    </div>
                    <div id="meer-informatie-info" class="additional-info">
                        <label for="meer-informatie-text">Toelichting:</label>
                        <textarea id="meer-informatie-text" name="meer-informatie-text"></textarea>
                    </div>
                </div>
            </div>

            <!-- Step 5 -->
            <div class="step-content" id="step5">
                <div class="form-group">
                    <label for="ondertekenaar">Voorletter(s) en achternaam:</label>
                    <input type="text" id="ondertekenaar" name="ondertekenaar" required>
                </div>
                <div class="form-group">
                    <label for="datum-aanvraag">Datum aanvraag:</label>
                    <input type="date" id="datum-aanvraag" name="datum-aanvraag" required>
                </div>
                <br><br>
                <div class="form-confirm">
                    <label>
                        Ik verklaar:
                        <ul>
                            <li>Dat de volledige tekst van alle acceptatievragen door de adviseur aan mij is voorgelegd;</li>
                            <li>Dat mijn antwoorden juist en volledig zijn;</li>
                            <li>Dat ik de polisvoorwaarden en verzekeringskaarten die horen bij deze verzekering heb ontvangen;</li>
                            <li>Dat ik akkoord ga met de toepasselijkheid van de polisvoorwaarden die bij deze verzekering horen;</li>
                            <li>Dat ik een verzekering wil sluiten volgens de dekking zoals omschreven in deze polisvoorwaarden;</li>
                            <li>Dat ik de afgesproken premie en kosten betaal als ik de polis ontvang die volgens deze aanvraag is opgemaakt;</li>
                            <li>Dat a.s.r. informatie over mijn schade- en verzekeringsverleden mag opvragen bij andere verzekeraars of adviseurs;</li>
                            <li>Dat ik de personen waarvan persoonsgegevens op dit aanvraagformulier staan, heb geïnformeerd dat deze gegevens door a.s.r. worden verwerkt.</li>
                        </ul>
                    </label>
                    <label><strong>Akkoord<input type="checkbox" id="verklaring" name="verklaring" required></strong></label>
                </div>
                <br>
                <div class="form-group">
                    <label><strong>Uw digitale handtekening</strong></label>
                    <canvas id="signature-pad" class="signature-pad" width="400" height="200"></canvas>
                    <button id="clear-signature">Herstel handtekening</button>
                </div>
                <!-- Aanvraag indienen knop -->
                <button class="submit-button" type="button" id="submitBtn">Aanvraag indienen</button>

                <!-- Popup Modal -->
                <div id="confirmationModal" class="modal">
                    <div class="modal-content">
                        <p>Zijn alle antwoorden ingevuld?</p>
                        <div class="modal-buttons">
                            <button onclick="handleSubmit(true)">Ja</button>
                            <button onclick="handleSubmit(false)">Nee</button>
                        </div>
                    </div>
                </div>

                <!-- Resultaat bericht -->
                <div id="resultMessage" class="modal">
                    <div class="modal-content">
                        <p id="resultText"></p>
                        <div class="modal-buttons">
                            <button onclick="closeModal()">Sluiten</button>
                        </div>
                    </div>
                </div>

                <script>
                    // Initialiseer SignaturePad
                    var canvas = document.getElementById('signature-pad');
                    var signaturePad = new SignaturePad(canvas);
                    document.getElementById('clear-signature').addEventListener('click', function() {
                        signaturePad.clear();
                    });

                    // Modal functies
                    function showModal() {
                        document.getElementById('confirmationModal').style.display = 'block';
                    }

                    function closeModal() {
                        document.getElementById('confirmationModal').style.display = 'none';
                        document.getElementById('resultMessage').style.display = 'none';
                    }

                    // Verstuur formulier via EmailJS
                    function submitForm() {
                        const form = document.getElementById('insurance-form');
                        const formData = new FormData(form);
                        let emailBody = "Aanvraagformulier Dekkerautoverzekering\n\n";

                        // Verzamel alle formuliergegevens
                        for (let [key, value] of formData.entries()) {
                            if (value && value !== 'on') {
                                emailBody += `${key}: ${value}\n`;
                            }
                        }

                        // Voeg de handtekening toe
                        const signatureData = signaturePad.toDataURL('image/png');
                        if (!signaturePad.isEmpty()) {
                            emailBody += `\nDigitale handtekening (base64): ${signatureData}\n`;
                        } else {
                            emailBody += "\nGeen handtekening toegevoegd.\n";
                        }

                        // Verstuur via EmailJS
                        emailjs.send("service_wke8swi", "template_igkvytp", {
                            message: emailBody
                        })
                        .then(() => {
                            document.getElementById('resultText').innerHTML = `
                                <strong>Uw aanvraag is verzonden!</strong><br><br>
                                Wij danken u voor het in ons gestelde vertrouwen.<br><br>
                                Heeft u het online aanvraagformulier volledig ingevuld, dan is uw auto per gewenste ingangsdatum in voorlopige dekking genomen en ontvangt u binnen ca. 10 werkdagen de betreffende polisstukken.<br><br>
                                Is het online aanvraagformulier niet volledig of onjuist ingevuld, dan zullen wij zo spoedig mogelijk contact met u opnemen.
                            `;
                            document.getElementById('resultMessage').style.display = 'block';
                        })
                        .catch((error) => {
                            document.getElementById('resultText').innerHTML = `
                                Er is een fout opgetreden bij het verzenden: ${error.text}
                            `;
                            document.getElementById('resultMessage').style.display = 'block';
                            console.error("EmailJS fout:", error);
                        });
                    }

                    // Behandel de keuze van de gebruiker
                    function handleSubmit(isConfirmed) {
                        document.getElementById('confirmationModal').style.display = 'none';
                        const resultTextElement = document.getElementById('resultText');

                        if (isConfirmed) {
                            submitForm();
                        } else {
                            resultTextElement.innerHTML = `
                                U wordt teruggeleid naar het aanvraagformulier om uw antwoorden te controleren. Uw antwoorden zijn opgeslagen.
                            `;
                            document.getElementById('resultMessage').style.display = 'block';
                        }
                    }

                    // Koppel de submit-knop
                    document.getElementById('submitBtn').addEventListener('click', showModal);
                </script>
            </div>

            <!-- Navigation Buttons -->
            <div class="navigation-buttons text-center">
                <button type="button" class="prev-button" id="prevBtn" onclick="nextPrev(-1)">Vorige</button>
                <button type="button" class="next-button" id="nextBtn" onclick="nextPrev(1)">Volgende</button>
            </div>
        </form>
    </div>

    <script>
        // Formulier navigatie
        let currentStep = 0;
        showStep(currentStep);

        function showStep(n) {
            let steps = document.getElementsByClassName("step-content");
            steps[n].style.display = "block";
            if (n == 0) {
                document.getElementById("prevBtn").style.display = "none";
            } else {
                document.getElementById("prevBtn").style.display = "inline";
            }
            if (n == (steps.length - 1)) {
                document.getElementById("nextBtn").style.display = "none";
            } else {
                document.getElementById("nextBtn").style.display = "inline";
            }
            updateStepIndicator(n);
        }

        function nextPrev(n) {
            let steps = document.getElementsByClassName("step-content");
            steps[currentStep].style.display = "none";
            currentStep = currentStep + n;
            if (currentStep >= steps.length) {
                return false;
            }
            showStep(currentStep);
        }

        function updateStepIndicator(n) {
            let indicators = document.getElementsByClassName("step");
            for (let i = 0; i < indicators.length; i++) {
                indicators[i].classList.remove("active-step");
            }
            indicators[n].classList.add("active-step");
        }

        // Conditionele velden
        document.querySelectorAll('input[name="regelmatige-bestuurder"]').forEach((elem) => {
            elem.addEventListener("change", function(event) {
                const value = event.target.value;
                const info = document.getElementById("regelmatige-bestuurder-info");
                if (value === "no") {
                    info.classList.add("active");
                } else {
                    info.classList.remove("active");
                }
            });
        });

        document.addEventListener('DOMContentLoaded', function() {
            const dekkingRadios = document.getElementsByName('dekking');
            const dekkingOmschrijving = document.getElementById('dekking-omschrijving');
            dekkingRadios.forEach(radio => {
                radio.addEventListener('change', function() {
                    if (this.value === 'anders') {
                        dekkingOmschrijving.style.display = 'block';
                    } else {
                        dekkingOmschrijving.style.display = 'none';
                    }
                });
            });

            const schadeErvaringRadios = document.getElementsByName('schade-ervaring');
            const schadeErvaringInfo = document.getElementById('schade-ervaring-info');
            schadeErvaringRadios.forEach(radio => {
                radio.addEventListener('change', function() {
                    if (this.value === 'yes') {
                        schadeErvaringInfo.style.display = 'block';
                    } else {
                        schadeErvaringInfo.style.display = 'none';
                    }
                });
            });

            const schadeVrijeJarenRadios = document.getElementsByName('schadevrije-jaren');
            const schadeVrijeJarenInfo = document.getElementById('schadevrije-jaren-info');
            schadeVrijeJarenRadios.forEach(radio => {
                radio.addEventListener('change', function() {
                    if (this.value === 'yes') {
                        schadeVrijeJarenInfo.style.display = 'block';
                    } else {
                        schadeVrijeJarenInfo.style.display = 'none';
                    }
                });
            });

            const opzegserviceYes = document.getElementById('opzegservice-yes');
            const opzegserviceNo = document.getElementById('opzegservice-no');
            const opzegserviceDetails = document.getElementById('opzegservice-details');
            opzegserviceYes.addEventListener('change', function() {
                opzegserviceDetails.style.display = 'block';
            });
            opzegserviceNo.addEventListener('change', function() {
                opzegserviceDetails.style.display = 'none';
            });

            const particulierRadio = document.getElementById('particulier');
            const zakelijkRadio = document.getElementById('zakelijk');
            const zakelijkInfo = document.getElementById('zakelijk-info');
            particulierRadio.addEventListener('change', function() {
                zakelijkInfo.style.display = 'none';
            });
            zakelijkRadio.addEventListener('change', function() {
                zakelijkInfo.style.display = 'block';
            });

            const rechtsvormSelect = document.getElementById('rechtsvorm');
            const rechtsvormOmschrijvingContainer = document.getElementById('rechtsvorm-omschrijving-container');
            rechtsvormSelect.addEventListener('change', function() {
                if (this.value === 'anders') {
                    rechtsvormOmschrijvingContainer.style.display = 'block';
                } else {
                    rechtsvormOmschrijvingContainer.style.display = 'block';
                }
            });

            const aantalBelanghebbendenInput = document.getElementById('aantal-belanghebbenden');
            const belanghebbendenInfo = document.getElementById('belanghebbenden-info');
            aantalBelanghebbendenInput.addEventListener('input', function() {
                belanghebbendenInfo.innerHTML = '';
                const aantal = this.value;
                for (let i = 1; i <= aantal; i++) {
                    const container = document.createElement('div');
                    container.innerHTML = `
                        <h4>Belanghebbende ${i}</h4>
                        <div class="form-group">
                            <label>Voorletter(s) en achternaam</label>
                            <input type="text" name="belanghebbende-${i}-naam">
                        </div>
                        <div class="form-group">
                            <label>Adres</label>
                            <input type="text" name="belanghebbende-${i}-adres">
                        </div>
                        <div class="form-group">
                            <label>Postcode en woonplaats</label>
                            <input type="text" name="belanghebbende-${i}-postcode">
                        </div>
                        <div class="form-group">
                            <label>Geboortedatum</label>
                            <input type="date" name="belanghebbende-${i}-geboortedatum">
                        </div>
                    `;
                    belanghebbendenInfo.appendChild(container);
                }
            });

            function toggleAdditionalInfo(radioGroupName, infoDivId) {
                const radios = document.getElementsByName(radioGroupName);
                const infoDiv = document.getElementById(infoDivId);
                radios.forEach(radio => {
                    radio.addEventListener('change', function() {
                        if (this.value === 'yes') {
                            infoDiv.style.display = 'block';
                        } else {
                            infoDiv.style.display = 'none';
                        }
                    });
                });
            }

            toggleAdditionalInfo('onverzekerd', 'onverzekerd-info');
            toggleAdditionalInfo('verzekeraar', 'verzekeraar-info');
            toggleAdditionalInfo('failliet', 'failliet-info');
            toggleAdditionalInfo('beslag', 'beslag-info');
            toggleAdditionalInfo('rijontzegging', 'rijontzegging-info');
            toggleAdditionalInfo('conflict', 'conflict-info');
            toggleAdditionalInfo('meer-informatie', 'meer-informatie-info');
        });
    </script>
</body>
</html>
